<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🍄 数学大冒险 Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    overflow-x:hidden;

    background:
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
        url("https://junezy0602-byte.github.io/math-game/bg.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.cloud{
    position:fixed;
    top:0;
    width:200px;
    opacity:0.7;
    animation:cloudMove 60s linear infinite;
}
.cloud:nth-child(1){ top:50px; left:-200px; animation-duration:60s;}
.cloud:nth-child(2){ top:150px; left:-300px; animation-duration:80s;}
.cloud:nth-child(3){ top:250px; left:-250px; animation-duration:70s;}

@keyframes cloudMove{
    from{ transform:translateX(0);}
    to{ transform:translateX(120vw);}
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

#topbar{
    padding:10px;
    font-size:18px;
    background:rgba(0,0,0,0.3);
}

.level-btn{
    font-size:20px;
    padding:18px 30px;
    margin:15px;
    border:none;
    border-radius:20px;
    background:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:all 0.2s;
}

.level-btn:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
    cursor:pointer;
}

.card{
    width:90%;
    max-width:420px;
    margin:30px auto;
    padding:25px;
    border-radius:20px;
    background:white;
    color:black;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #ccc;
}

.submit-btn{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
}

#combo{
    font-size:20px;
    margin:10px;
    color:yellow;
}
</style>
</head>

<body>

<div class="cloud">☁️☁️☁️</div>
<div class="cloud">☁️☁️</div>
<div class="cloud">☁️☁️☁️☁️</div>

<audio id="bgm" loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div id="home" style="padding-top:70px;">
    <h1 style="font-size:42px;text-shadow:0 5px 20px rgba(0,0,0,0.5);animation:float 3s infinite;">
        🍄 数学大冒险
    </h1>

    <p style="font-size:20px;margin-top:10px;">
        ⚡ 数学反应挑战
    </p>

    <p style="font-size:16px;opacity:0.9;margin-bottom:30px;">
        看看你能答对多少题！
    </p>

    <div>
        <button class="level-btn" onclick="startGame(1)">🟢 新手挑战</button>
        <button class="level-btn" onclick="startGame(2)">🔵 进阶挑战</button>
        <button class="level-btn" onclick="startGame(3)">🔴 大师挑战</button>
    </div>

    <div style="margin-top:40px;font-size:15px;">
        ⏱ 限时作答 ❤️ 3次机会 🔥 连击加分
    </div>
</div>

<div id="game" style="display:none;">
    <div id="topbar"></div>
    <div id="combo"></div>

    <div class="card">
        <div id="question" style="font-size:20px;margin-bottom:10px;white-space:pre-line;"></div>
        <input id="answer" placeholder="输入答案">
        <br>
        <button class="submit-btn" onclick="check()">提交</button>
        <div style="font-size:13px;color:#666;margin-top:5px;">
        👉 不用打逗号，直接输入数字
        </div>
    </div>
</div>

<script>

const DB_URL="https://y1-3-math-prt-1-default-rtdb.asia-southeast1.firebasedatabase.app/records.json";

let name="",level=1,score=0,lives=3,timeLeft=0,timer;
let currentQ,combo=0,lastCompareType=null,qIndex=0,stats;

// Enter键
document.addEventListener("keydown",e=>{
    if(e.key==="Enter") check();
});

// 音乐
function playMusic(){
    const bgm=document.getElementById("bgm");
    document.addEventListener("click",()=>bgm.play(),{once:true});
}

// 开始
function startGame(l){
    playMusic();
    name=prompt("输入名字");
    if(!name) return;

    level=l;
    home.style.display="none";
    game.style.display="block";

    reset();
    next();
}

// 时间
function getTime(){return level==1?45:level==2?30:25;}

function startTimer(){
    clearInterval(timer);
    timeLeft=getTime();
    timer=setInterval(()=>{
        timeLeft--;
        updateUI();
        if(timeLeft<=0) endGame();
    },1000);
}

// 工具
function rand(max){return Math.floor(Math.random()*max);}

// ===== 题型 =====
function genCompare(max){
    let a,b;
    do{a=rand(max);b=rand(max);}while(a===b);

    let type=lastCompareType==="big"?"small":"big";
    lastCompareType=type;

    return type==="big"
    ? {type:"compare",q:`比较大小：\n${a} 和 ${b} 谁大？`,answer:String(Math.max(a,b))}
    : {type:"compare",q:`比较大小：\n${a} 和 ${b} 谁小？`,answer:String(Math.min(a,b))};
}

function genOrder(max){
    let count=level==1?3:level==2?4:5;
    let nums=Array.from({length:count},()=>rand(max));
    let sorted=[...nums].sort((a,b)=>a-b);
    let asc=Math.random()<0.5;

    return{
        type:"order",
        q:asc?`从小到大排列：\n${nums.join(" , ")}`:`从大到小排列：\n${nums.join(" , ")}`,
        answer:asc?sorted.join(","):sorted.reverse().join(",")
    }
}

function genPattern(){
    let start=rand(50),step=rand(5)+1;
    return Math.random()<0.5
    ? {type:"pattern",q:`找规律：\n${start} , ${start+step} , ${start+2*step} , ?`,answer:String(start+3*step)}
    : {type:"pattern",q:`找规律：\n${start} , ${start-step} , ${start-2*step} , ?`,answer:String(start-3*step)};
}

function genAdd(max){
    let a=rand(max/2),b=rand(max/2);
    return{type:"add",q:`计算：${a} + ${b}`,answer:String(a+b)}
}

function genSub(max){
    let a=rand(max),b=rand(max);
    if(a<b)[a,b]=[b,a];
    return{type:"sub",q:`计算：${a} - ${b}`,answer:String(a-b)}
}

// 出题
function genQ(){
    let max=level==1?100:level==2?1000:10000;
    let sequence=[genCompare,genAdd,genOrder,genSub,genPattern];
    let fn=sequence[qIndex % sequence.length];
    qIndex++;
    return fn(max);
}

// 下一题
function next(){
    startTimer();
    currentQ=genQ();
    question.innerText=currentQ.q;
    answer.value="";
}

// 判题
function normalize(s){
    return s.replace(/[^0-9]/g,",").split(",").filter(x=>x).join(",");
}

function check(){

    let ok=normalize(answer.value)==normalize(currentQ.answer);

    stats.total++;
    stats[currentQ.type].t++;

    if(ok){
        score+=5;
        combo++;
        stats.correct++;
        stats[currentQ.type].c++;
    }else{
        combo=0;
        lives--;
    }

    updateUI();

    if(lives<=0){endGame();return;}
    next();
}

// UI
function updateUI(){
    topbar.innerText=`🍄 ${name} | ⭐${score} | ⏱${timeLeft}s | ❤️${lives}`;
    combo.innerText=combo>=2?`🔥 x${combo}`:"";
}

// 重置
function reset(){
    score=0;
    lives=3;
    combo=0;

    stats={
        compare:{c:0,t:0},
        order:{c:0,t:0},
        pattern:{c:0,t:0},
        add:{c:0,t:0},
        sub:{c:0,t:0},
        total:0,
        correct:0
    };
}

// 结束（防无数据）
function endGame(){

    const types=["compare","order","pattern","add","sub"];
    types.forEach(type=>{
        if(!stats[type]){
            stats[type]={c:0,t:0};
        }
    });

    clearInterval(timer);
    saveData();
    alert("游戏结束");
    location.reload();
}

// 上传
async function saveData(){
    await fetch(DB_URL,{
        method:"POST",
        body:JSON.stringify({
            name,
            score,
            correct:stats.correct,
            total:stats.total,
            stats:stats,
            time:new Date().toLocaleString()
        })
    });
}

</script>

</body>
</html>
