<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🍄 数学大冒险 Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;text-align:center;background:linear-gradient(#5c94fc,#87ceeb);color:white;}
#topbar{padding:10px;font-size:18px;background:rgba(0,0,0,0.3);}
.level-btn{font-size:20px;padding:15px 25px;margin:10px;border:none;border-radius:15px;background:white;}
.card{width:90%;max-width:420px;margin:30px auto;padding:25px;border-radius:20px;background:white;color:black;}
input{width:90%;padding:12px;font-size:18px;border-radius:10px;border:2px solid #ccc;}
.submit-btn{margin-top:10px;padding:10px 20px;font-size:16px;border:none;border-radius:10px;background:#4CAF50;color:white;}
#combo{font-size:20px;margin:10px;color:yellow;}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div id="home">
    <h1>🍄 数学大冒险</h1>
    <button class="level-btn" onclick="startGame(1)">🌍 Level 1</button>
    <button class="level-btn" onclick="startGame(2)">🌍 Level 2</button>
    <button class="level-btn" onclick="startGame(3)">🌍 Level 3</button>
</div>

<div id="game" style="display:none;">
    <div id="topbar"></div>
    <div id="combo"></div>

    <div class="card">
        <div id="question"></div>
        <input id="answer" placeholder="输入答案">
        <br>
        <button class="submit-btn" onclick="check()">提交</button>
        <div style="font-size:13px;color:#666;">👉 不用打逗号</div>
    </div>
</div>

<script>

// ===== Firebase =====
const DB="https://y1-3-math-prt-1-default-rtdb.asia-southeast1.firebasedatabase.app/records";

// ===== 状态 =====
let name="",level=1,score=0,lives=3,timeLeft=0,timer;
let currentQ,combo=0;

// ✅ 新增：分析数据
let stats;

// ===== 音乐 =====
function playMusic(){
    const bgm=document.getElementById("bgm");
    document.addEventListener("click",()=>bgm.play(),{once:true});
}

// ===== 开始 =====
function startGame(l){
    playMusic();

    name=prompt("输入名字");
    if(!name) return;

    level=l;
    document.getElementById("home").style.display="none";
    document.getElementById("game").style.display="block";

    reset();
    startTimer();
    next();
}

// ===== 时间 =====
function getTime(){return level==1?30:level==2?25:20;}

function startTimer(){
    clearInterval(timer);
    timeLeft=getTime();

    timer=setInterval(()=>{
        timeLeft--;
        updateUI();
        if(timeLeft<=0) endGame();
    },1000);
}

// ===== 工具 =====
function rand(max){return Math.floor(Math.random()*max);}

// ===== 题型 =====

function genCompare(max){
    let a=rand(max),b=rand(max);
    return{type:"compare",q:`比较大小：${a} 和 ${b} 谁大？`,a:String(Math.max(a,b))};
}

function genOrder(max){
    let nums=[rand(max),rand(max),rand(max)];
    let sorted=[...nums].sort((a,b)=>a-b);
    return{type:"order",q:`排序：${nums.join(",")}`,a:sorted.join(",")};
}

function genPattern(){
    let start=rand(50),step=rand(5)+1;
    return{type:"pattern",q:`${start},${start+step},${start+2*step},?`,a:String(start+3*step)};
}

function genAdd(max){
    let a=rand(max/2),b=rand(max/2);
    return{type:"add",q:`${a}+${b}`,a:String(a+b)};
}

function genSub(max){
    let a=rand(max),b=rand(max);
    if(a<b)[a,b]=[b,a];
    return{type:"sub",q:`${a}-${b}`,a:String(a-b)};
}

function genQ(){
    let max=level==1?100:level==2?1000:10000;
    let list=[genCompare,genOrder,genPattern,genAdd,genSub];
    return list[rand(list.length)](max);
}

// ===== 下一题 =====
function next(){
    currentQ=genQ();
    question.innerText=currentQ.q;
    answer.value="";
}

// ===== 输入处理 =====
function normalize(s){
    return s.replace(/[^0-9]/g,",").split(",").filter(x=>x).join(",");
}

// ===== 判题 =====
function check(){

    let ok=normalize(answer.value)==normalize(currentQ.a);

    stats.total++;
    stats[currentQ.type].t++;

    if(ok){
        score+=5;
        combo++;
        stats.correct++;
        stats[currentQ.type].c++;
    }else{
        combo=0;
        lives--;
    }

    updateUI();

    if(lives<=0){endGame();return;}
    next();
}

answer.addEventListener("keydown",e=>{
    if(e.key==="Enter") check();
});

// ===== UI =====
function updateUI(){
    topbar.innerText=`🍄 ${name} | ⭐${score} | ⏱${timeLeft}s | ❤️${lives}`;
    comboDiv=document.getElementById("combo");
    comboDiv.innerText=combo>=2?`🔥 x${combo}`:"";
}

// ===== 重置 =====
function reset(){
    score=0; lives=3; combo=0;

    stats={
        compare:{c:0,t:0},
        order:{c:0,t:0},
        pattern:{c:0,t:0},
        add:{c:0,t:0},
        sub:{c:0,t:0},
        total:0,
        correct:0
    };
}

// ===== 结束 =====
function endGame(){
    clearInterval(timer);
    saveData();
    alert("游戏结束");
    location.reload();
}

// ===== ⭐核心：覆盖写入 =====
async function saveData(){

    let id=name.trim().toLowerCase();

    await fetch(`${DB}/${id}.json`,{
        method:"PUT",
        body:JSON.stringify({
            name,
            score,
            correct:stats.correct,
            total:stats.total,
            stats,
            time:new Date().toLocaleString()
        })
    });
}

</script>
</body>
</html>
