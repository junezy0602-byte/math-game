<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🍄 数学大冒险 Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(#5c94fc,#87ceeb);
    color:white;
}

#topbar{
    padding:10px;
    font-size:18px;
    background:rgba(0,0,0,0.3);
}

.level-btn{
    font-size:20px;
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:15px;
    background:white;
}

.card{
    width:90%;
    max-width:420px;
    margin:30px auto;
    padding:25px;
    border-radius:20px;
    background:white;
    color:black;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #ccc;
}

.submit-btn{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
}

#combo{
    font-size:20px;
    margin:10px;
    color:yellow;
}
</style>
</head>

<body>

<!-- 🎵 音乐 -->
<audio id="bgm" loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div id="home">
    <h1>🍄 数学大冒险</h1>
    <button class="level-btn" onclick="startGame(1)">🌍 Level 1</button>
    <button class="level-btn" onclick="startGame(2)">🌍 Level 2</button>
    <button class="level-btn" onclick="startGame(3)">🌍 Level 3</button>
</div>

<div id="game" style="display:none;">
    <div id="topbar"></div>
    <div id="combo"></div>

    <div class="card">
        <div id="question" style="font-size:20px;margin-bottom:10px;white-space:pre-line;"></div>

        <input id="answer" placeholder="输入答案">

        <br>
        <button class="submit-btn" onclick="check()">提交</button>

        <div style="font-size:13px;color:#666;margin-top:5px;">
        👉 不用打逗号，直接输入数字
        </div>
    </div>
</div>

<script>

// ===== Firebase =====
const DB_URL="https://y1-3-math-prt-1-default-rtdb.asia-southeast1.firebasedatabase.app/records.json";

// ===== 状态 =====
let name="",level=1,score=0,lives=3,timeLeft=0,timer;
let currentQ,combo=0;

// ===== 🎵 音乐 =====
let audioStarted=false;

function playMusic(){
    if(audioStarted) return;

    const bgm=document.getElementById("bgm");

    function startAudio(){
        bgm.play().then(()=>{
            audioStarted=true;
            document.removeEventListener("click",startAudio);
            document.removeEventListener("touchstart",startAudio);
        }).catch(()=>{});
    }

    document.addEventListener("click",startAudio);
    document.addEventListener("touchstart",startAudio);

    startAudio();
}

// ===== 开始 =====
function startGame(l){
    playMusic();

    name=prompt("输入名字");
    if(!name) return;

    level=l;
    document.getElementById("home").style.display="none";
    document.getElementById("game").style.display="block";

    reset();
    next(); // ⭐ 改这里（不先开timer）
}

// ===== ⏱ 时间（已修改）=====
function getTime(){
    return level==1 ? 45 :
           level==2 ? 30 :
           25;
}

function startTimer(){
    clearInterval(timer);
    timeLeft=getTime();

    timer=setInterval(()=>{
        timeLeft--;
        updateUI();

        if(timeLeft<=0){
            endGame();
        }
    },1000);
}

// ===== 工具 =====
function rand(max){return Math.floor(Math.random()*max);}

// ===== 题型 =====

function genCompare(max){
    let a=rand(max),b=rand(max);
    return{
        q:`比较大小：${a} 和 ${b} 谁大？`,
        answer:String(Math.max(a,b))
    }
}

function genOrder(max){
    let nums=Array.from({length:3},()=>rand(max));
    let sorted=[...nums].sort((a,b)=>a-b);
    let asc=Math.random()<0.5;

    return{
        q:asc
        ? `从小到大排列：\n${nums.join(" , ")}`
        : `从大到小排列：\n${nums.join(" , ")}`,
        answer:asc?sorted.join(","):sorted.reverse().join(",")
    }
}

function genPattern(max){
    let start=rand(50);
    let step=rand(5)+1;

    return{
        q:`找规律：${start} , ${start+step} , ${start+2*step} , ?`,
        answer:String(start+3*step)
    }
}

function genAdd(max){
    let a=rand(max/2),b=rand(max/2);
    return{q:`计算：${a} + ${b}`,answer:String(a+b)}
}

function genSub(max){
    let a=rand(max),b=rand(max);
    if(a<b)[a,b]=[b,a];
    return{q:`计算：${a} - ${b}`,answer:String(a-b)}
}

function genQ(){
    let max=level==1?100:level==2?1000:10000;
    let list=[genCompare,genOrder,genPattern,genAdd,genSub];
    return list[rand(list.length)](max);
}

// ===== 下一题（⭐关键：每题重置时间）=====
function next(){

    startTimer(); // ⭐ 每一题重新计时

    currentQ=genQ();
    document.getElementById("question").innerText=currentQ.q;
    document.getElementById("answer").value="";
}

// ===== 输入处理 =====
function normalize(s){
    return s.replace(/[^0-9]/g,",")
        .split(",")
        .map(x=>x.trim())
        .filter(x=>x)
        .join(",");
}

// ===== 判题 =====
function check(){
    let input=normalize(answer.value);
    let correct=normalize(currentQ.answer);

    if(input===correct){
        score+=5;
        combo++;
    }else{
        combo=0;
        lives--;
    }

    updateUI();

    if(lives<=0){
        endGame();
        return;
    }

    next();
}

// ===== Enter =====
document.getElementById("answer").addEventListener("keydown",e=>{
    if(e.key==="Enter") check();
});

// ===== UI =====
function updateUI(){
    document.getElementById("topbar").innerText=
    `🍄 ${name} | ⭐${score} | ⏱${timeLeft}s | ❤️${lives}`;

    document.getElementById("combo").innerText=
    combo>=2?`🔥 x${combo}`:"";
}

// ===== 重置 =====
function reset(){
    score=0;
    lives=3;
    combo=0;
}

// ===== 结束 =====
function endGame(){
    clearInterval(timer);
    saveData();
    alert("游戏结束");
    location.reload();
}

// ===== 上传 =====
async function saveData(){
    await fetch(DB_URL,{
        method:"POST",
        body:JSON.stringify({
            name,score,time:new Date().toLocaleString()
        })
    });
}

</script>

</body>
</html>
