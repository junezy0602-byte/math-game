<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>📊 教学分析系统</title>

<style>
body{
    font-family:Arial;
    background:#eef2ff;
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    margin:10px auto;
    max-width:500px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:left;
}

.weak{color:red;font-weight:bold;}
.good{color:green;}

.summary{
    background:#fff3cd;
    padding:15px;
    border-radius:10px;
    margin:20px;
}
</style>
</head>

<body>

<h1>📊 教学分析</h1>

<div id="summary"></div>
<div id="list">加载中...</div>

<script>

const DB="https://y1-3-math-prt-1-default-rtdb.asia-southeast1.firebasedatabase.app/records.json";

const map={
    compare:"比较",
    order:"排序",
    pattern:"规律"
};

function analyze(s){

    let result=[];

    for(let k in s){
        if(!s[k]||s[k].t===0) continue;

        let rate=s[k].c/s[k].t;

        if(rate<0.5){
            result.push(`${map[k]}弱(${Math.round(rate*100)}%)`);
        }
    }

    return result.length?result.join(" / "):"表现均衡";
}

function classWeak(data){

    let count={compare:0,order:0,pattern:0};

    for(let id in data){
        let s=data[id].stats;
        if(!s) continue;

        for(let k in s){
            if(!s[k]||s[k].t===0) continue;

            let rate=s[k].c/s[k].t;
            if(rate<0.5) count[k]++;
        }
    }

    let worst=Object.entries(count).sort((a,b)=>b[1]-a[1])[0];

    return worst[1]===0?"全班良好":"全班最弱："+map[worst[0]];
}

async function load(){

    let res=await fetch(DB);
    let data=await res.json();

    if(!data){
        list.innerHTML="无数据";
        return;
    }

    summary.innerText=classWeak(data);

    let html="";

    for(let id in data){

        let d=data[id];

        html+=`
        <div class="card">
        <b>${d.name}</b><br>
        分数：${d.score}<br>
        正确：${d.correct}/${d.total}<br>
        👉 ${analyze(d.stats)}
        </div>
        `;
    }

    list.innerHTML=html;
}

load();

</script>
</body>
</html>
