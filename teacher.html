<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>📊 教学分析</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    text-align:center;
    margin:0;
}

h1{
    margin:20px;
}

.card{
    width:90%;
    max-width:420px;
    margin:15px auto;
    padding:20px;
    border-radius:15px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:left;
}

.delete-btn{
    margin-top:10px;
    background:red;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:8px;
}

.clear-btn{
    margin:15px;
    background:black;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>📊 教学分析</h1>
<div id="weak"></div>

<button class="clear-btn" onclick="clearAll()">🗑 清空全部数据</button>

<div id="list"></div>

<script>

const DB="https://y1-3-math-prt-1-default-rtdb.asia-southeast1.firebasedatabase.app/records";

// ===== 读取数据 =====
async function load(){

    let res=await fetch(DB+".json");
    let data=await res.json();

    if(!data){
        list.innerHTML="暂无数据";
        return;
    }

    let html="";
    let weakCount={
        compare:0,
        order:0,
        pattern:0,
        add:0,
        sub:0
    };

    Object.values(data).forEach(s=>{

        // ❗过滤垃圾数据
        if(!s.name || s.name==="." || s.name.trim()==="") return;

        let weak="无数据";

        if(s.stats){

            let rates=[];

            for(let k in s.stats){
                if(k==="total"||k==="correct") continue;

                let t=s.stats[k].t;
                let c=s.stats[k].c;

                if(t>0){
                    let wrong=(t-c)/t;
                    rates.push({type:k,rate:wrong});
                }
            }

            if(rates.length>0){
                rates.sort((a,b)=>b.rate-a.rate);
                weak=rates[0].type+"弱 ("+Math.round(rates[0].rate*100)+"%)";

                weakCount[rates[0].type]++;
            }
        }

        html+=`
        <div class="card">
            <b>${s.name}</b><br>
            分数：${s.score||0}<br>
            正确：${s.correct||0}/${s.total||0}<br>
            👉 ${weak}

            <br>
            <button class="delete-btn" onclick="deleteStudent('${s.name}')">
            删除
            </button>
        </div>
        `;
    });

    list.innerHTML=html;

    // ===== 全班最弱 =====
    let worst="无数据";
    let max=0;

    for(let k in weakCount){
        if(weakCount[k]>max){
            max=weakCount[k];
            worst=k;
        }
    }

    weak.innerHTML=`👉 全班最弱：${translate(worst)}`;
}

// ===== 删除单个 =====
async function deleteStudent(name){

    if(!confirm("确定删除这个学生？")) return;

    let id=name.toLowerCase();

    await fetch(`${DB}/${id}.json`,{
        method:"DELETE"
    });

    alert("已删除");
    location.reload();
}

// ===== 清空全部 =====
async function clearAll(){

    if(!confirm("⚠️ 确定清空全部数据？")) return;

    await fetch(DB+".json",{
        method:"DELETE"
    });

    alert("已清空");
    location.reload();
}

// ===== 翻译 =====
function translate(t){
    return {
        compare:"比较",
        order:"排序",
        pattern:"规律",
        add:"加法",
        sub:"减法"
    }[t]||"无数据";
}

// ===== 启动 =====
load();

</script>

</body>
</html>
