<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>📊 教学分析系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial;
    background:#f2f4f8;
    text-align:center;
    margin:0;
}

h1{
    margin:20px;
}

.card{
    width:90%;
    max-width:420px;
    margin:15px auto;
    padding:20px;
    border-radius:15px;
    background:white;
    text-align:left;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h1>📊 教学分析</h1>
<div id="classWeak"></div>
<div id="list"></div>

<script>

const DB="https://y1-3-math-prt-1-default-rtdb.asia-southeast1.firebasedatabase.app/records.json";

async function load(){

    let res=await fetch(DB);
    let data=await res.json();

    if(!data) return;

    let html="";
    let classStats={
        compare:0,
        order:0,
        pattern:0,
        add:0,
        sub:0
    };

    Object.values(data).forEach(d=>{

        let name=d.name || "匿名";

        // ✅ 防炸
        let correct=d.correct ?? 0;
        let total=d.total ?? 0;

        let stats=d.stats || {};

        let compare=getRate(stats,"compare");
        let order=getRate(stats,"order");
        let pattern=getRate(stats,"pattern");
        let add=getRate(stats,"add");
        let sub=getRate(stats,"sub");

        // ===== 统计全班 =====
        classStats.compare+=compare;
        classStats.order+=order;
        classStats.pattern+=pattern;
        classStats.add+=add;
        classStats.sub+=sub;

        // ===== 找最弱 =====
        let map={
            "比较":compare,
            "排序":order,
            "规律":pattern,
            "加法":add,
            "减法":sub
        };

        let weakKey=Object.keys(map).reduce((a,b)=>map[a]<map[b]?a:b);

        let weakText = total===0
        ? "👉 无数据"
        : (map[weakKey] < 0.5
            ? `👉 ${weakKey}弱 (${Math.round(map[weakKey]*100)}%)`
            : "👉 表现均衡");

        html+=`
        <div class="card">
            <b>${name}</b><br>
            分数：${d.score ?? 0}<br>
            正确：${correct}/${total}<br>
            ${weakText}
        </div>
        `;
    });

    // ===== 全班最弱 =====
    let avgWeak=Object.keys(classStats).reduce((a,b)=>classStats[a]<classStats[b]?a:b);

    document.getElementById("classWeak").innerHTML=
    `<h3>👉 全班最弱：${translate(avgWeak)}</h3>`;

    document.getElementById("list").innerHTML=html;
}

// ===== 工具 =====
function getRate(stats,key){
    if(!stats[key] || stats[key].t===0) return 0;
    return stats[key].c / stats[key].t;
}

function translate(k){
    return {
        compare:"比较",
        order:"排序",
        pattern:"规律",
        add:"加法",
        sub:"减法"
    }[k];
}

load();

</script>

</body>
</html>
